<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Error Debug</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .error { color: red; }
        .success { color: green; }
        .info { color: blue; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        #results { margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 5px; }
        pre { background: #f0f0f0; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🐛 Network Error Debug Console</h1>
    
    <div class="debug-section">
        <h2>🔍 Current Environment Check</h2>
        <button onclick="checkEnvironment()">Check Environment</button>
        <div id="env-results"></div>
    </div>
    
    <div class="debug-section">
        <h2>🔗 URL Testing</h2>
        <button onclick="testURLs()">Test All URLs</button>
        <div id="url-results"></div>
    </div>
    
    <div class="debug-section">
        <h2>📡 Network Request Test</h2>
        <button onclick="testNetworkRequest()">Test Network Request</button>
        <div id="network-results"></div>
    </div>
    
    <div class="debug-section">
        <h2>🧪 API Endpoint Test</h2>
        <button onclick="testAPIEndpoint()">Test API Endpoint</button>
        <div id="api-results"></div>
    </div>
    
    <div id="results"></div>

    <script>
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = type;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            results.appendChild(div);
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        function checkEnvironment() {
            log('Checking browser environment...');
            
            const envDiv = document.getElementById('env-results');
            envDiv.innerHTML = `
                <div class="bg-gray-50 p-4 rounded">
                    <h3>Browser Environment:</h3>
                    <ul>
                        <li>User Agent: ${navigator.userAgent}</li>
                        <li>Current URL: ${window.location.href}</li>
                        <li>Origin: ${window.location.origin}</li>
                        <li>Protocol: ${window.location.protocol}</li>
                        <li>Host: ${window.location.host}</li>
                        <li>Fetch API Available: ${typeof fetch !== 'undefined'}</li>
                        <li>XMLHttpRequest Available: ${typeof XMLHttpRequest !== 'undefined'}</li>
                    </ul>
                </div>
            `;
            
            log('Environment check complete', 'success');
        }

        function testURLs() {
            log('Testing URLs...');
            
            const baseURL = window.location.origin;
            const testURLs = [
                baseURL + '/shop_management/',
                baseURL + '/shop_management/api/',
                baseURL + '/shop_management/api/sales/',
                baseURL + '/shop_management/api/sales/create.php',
                baseURL + '/shop_management/sales/',
                baseURL + '/shop_management/sales/pos.php'
            ];
            
            const urlDiv = document.getElementById('url-results');
            urlDiv.innerHTML = '<h3>URL Test Results:</h3>';
            
            testURLs.forEach(url => {
                const div = document.createElement('div');
                div.className = 'url-test bg-gray-50 p-3 my-2 rounded';
                div.innerHTML = `<strong>Testing:</strong> ${url}<br><span class="status">Testing...</span>`;
                urlDiv.appendChild(div);
                
                // Test URL with HEAD request
                fetch(url, { method: 'HEAD' })
                    .then(response => {
                        const status = response.status;
                        const statusText = response.statusText;
                        const statusClass = response.ok ? 'success' : 'error';
                        
                        div.querySelector('.status').innerHTML = 
                            `<span class="${statusClass}">Status: ${status} ${statusText}</span>`;
                        
                        log(`URL ${url}: ${status} ${statusText}`, statusClass);
                    })
                    .catch(error => {
                        div.querySelector('.status').innerHTML = 
                            `<span class="error">Error: ${error.message}</span>`;
                        
                        log(`URL ${url}: ERROR - ${error.message}`, 'error');
                    });
            });
        }

        async function testNetworkRequest() {
            log('Testing network request capabilities...');
            
            const networkDiv = document.getElementById('network-results');
            networkDiv.innerHTML = '<h3>Network Request Test:</h3>';
            
            // Test 1: Simple GET request
            try {
                const response = await fetch(window.location.href);
                log(`GET request to current page: ${response.status} ${response.statusText}`, 
                    response.ok ? 'success' : 'error');
            } catch (error) {
                log(`GET request failed: ${error.message}`, 'error');
            }
            
            // Test 2: POST request to a simple endpoint
            try {
                const testData = { test: 'data', timestamp: Date.now() };
                const response = await fetch(window.location.href, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testData)
                });
                
                const responseText = await response.text();
                log(`POST request: ${response.status} ${response.statusText}`, 
                    response.ok ? 'success' : 'error');
                
                if (!response.ok) {
                    log(`POST response: ${responseText.substring(0, 200)}...`, 'error');
                }
            } catch (error) {
                log(`POST request failed: ${error.message}`, 'error');
            }
            
            // Test 3: CORS check (if applicable)
            try {
                const apiURL = window.location.origin + '/shop_management/api/auth/check_session.php';
                const response = await fetch(apiURL, {
                    method: 'GET',
                    credentials: 'same-origin' // Important for session cookies
                });
                
                const data = await response.json();
                log(`API request (with credentials): ${response.status}`, 
                    response.ok ? 'success' : 'error');
                
                if (response.ok) {
                    networkDiv.innerHTML += `
                        <div class="bg-green-50 p-3 rounded mt-2">
                            <h4>API Response:</h4>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                log(`API request failed: ${error.message}`, 'error');
                
                networkDiv.innerHTML += `
                    <div class="bg-red-50 p-3 rounded mt-2">
                        <h4>API Error Details:</h4>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Type:</strong> ${error.name}</p>
                        <p><strong>URL:</strong> ${error.url || 'N/A'}</p>
                    </div>
                `;
            }
        }

        function testAPIEndpoint() {
            log('Testing API endpoint directly...');
            
            const apiDiv = document.getElementById('api-results');
            apiDiv.innerHTML = '<h3>API Endpoint Test:</h3>';
            
            // Test the actual API endpoint
            const apiURL = window.location.origin + '/shop_management/api/sales/create.php';
            
            // Test with proper data
            const testData = {
                items: [
                    { id: 1, name: 'Test Product', price: 10.00, quantity: 1 }
                ],
                payment_mode_id: 1,
                document_type: 'sale'
            };
            
            apiDiv.innerHTML += `
                <div class="bg-blue-50 p-3 rounded">
                    <h4>Testing API Endpoint:</h4>
                    <p><strong>URL:</strong> ${apiURL}</p>
                    <p><strong>Method:</strong> POST</p>
                    <p><strong>Data:</strong></p>
                    <pre>${JSON.stringify(testData, null, 2)}</pre>
                    <p><strong>Status:</strong> <span class="status">Sending request...</span></p>
                </div>
            `;
            
            fetch(apiURL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                credentials: 'same-origin', // Include cookies for session
                body: JSON.stringify(testData)
            })
            .then(async response => {
                const responseText = await response.text();
                
                apiDiv.querySelector('.status').innerHTML = 
                    `<span class="${response.ok ? 'success' : 'error'}">${response.status} ${response.statusText}</span>`;
                
                try {
                    const data = JSON.parse(responseText);
                    apiDiv.innerHTML += `
                        <div class="${response.ok ? 'bg-green-50' : 'bg-red-50'} p-3 rounded mt-2">
                            <h4>API Response:</h4>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                    
                    log(`API endpoint: ${response.status} ${response.statusText}`, 
                        response.ok ? 'success' : 'error');
                } catch (parseError) {
                    apiDiv.innerHTML += `
                        <div class="bg-red-50 p-3 rounded mt-2">
                            <h4>Response Parse Error:</h4>
                            <p><strong>Error:</strong> ${parseError.message}</p>
                            <p><strong>Raw Response:</strong></p>
                            <pre>${responseText}</pre>
                        </div>
                    `;
                    
                    log(`API response parse error: ${parseError.message}`, 'error');
                }
            })
            .catch(error => {
                apiDiv.querySelector('.status').innerHTML = 
                    `<span class="error">Error: ${error.message}</span>`;
                
                apiDiv.innerHTML += `
                    <div class="bg-red-50 p-3 rounded mt-2">
                        <h4>Network Error:</h4>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Type:</strong> ${error.name}</p>
                        <p><strong>Stack:</strong></p>
                        <pre>${error.stack}</pre>
                    </div>
                `;
                
                log(`API network error: ${error.message}`, 'error');
            });
        }

        // Auto-run some tests on page load
        window.addEventListener('load', function() {
            log('Debug console loaded');
            log('Current URL: ' + window.location.href);
            checkEnvironment();
        });
    </script>
</body>
</html>
